name: football-cards

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-footycards}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-footycards}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      DEV_MODE: "false"
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-1234}@postgres:5432/${DB_NAME:-footycards}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    volumes:
      - ./backend/static:/app/static
    # Without this, outbound calls to api.telegram.org (channel-membership
    # checks for premium tasks) can fail with "Network is unreachable": the
    # host resolves both an A and AAAA record for api.telegram.org, but the
    # default Docker bridge network gives containers no working IPv6 route.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-1234}@postgres:5432/${DB_NAME:-footycards}
      BOT_MODE: ${BOT_MODE:-polling}
    ports:
      - "${BOT_WEBHOOK_PORT:-8081}:8081"
    # Same IPv6-unreachable issue as `backend` — the bot calls api.telegram.org
    # directly (set_webhook, sendMessage, etc.), so it needs IPv4-only too.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_STATIC_URL: /static
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
